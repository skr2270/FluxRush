<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#07070d"/>
  <!-- Glowing neon circle (player orb cursor) -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#00ffff" stroke-width="1.8" filter="url(#glow)"/>
  <!-- Glowing center dot -->
  <circle cx="16" cy="16" r="3" fill="#39ff14" filter="url(#glow)"/>
  <!-- Core outer accent ring -->
  <path d="M 6 16 A 10 10 0 0 1 26 16" fill="none" stroke="#bd00ff" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>
</svg>
